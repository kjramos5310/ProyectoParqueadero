name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - test
      - dev
  pull_request:
    branches:
      - main
      - test
      - dev

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0  # SonarCloud requiere historial completo para un análisis correcto

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Compile Java Microservices (Maven)
        run: |
          mvn -B clean compile

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install and Build NestJS Microservices (npm Workspaces)
        run: |
          npm ci
          npm run build:vehiculos
          npm run build:tickets

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Notify Telegram (Success)
        uses: appleboy/telegram-action@master
        if: success()
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            ✅ *Build exitoso en GitHub Actions*
            
            *Repositorio:* ${{ github.repository }}
            *Rama:* `${{ github.ref_name || github.head_ref }}`
            *Commit:* ${{ github.event.head_commit.message || 'N/A' }}
            *Autor:* `${{ github.actor }}`
            
            El análisis de calidad en SonarCloud ha culminado con éxito.

      - name: Notify Telegram (Failure)
        uses: appleboy/telegram-action@master
        if: failure()
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            ❌ *FALLO en el Build de GitHub Actions*
            
            *Repositorio:* ${{ github.repository }}
            *Rama:* `${{ github.ref_name || github.head_ref }}`
            *Commit:* ${{ github.event.head_commit.message || 'N/A' }}
            *Autor:* `${{ github.actor }}`
            
            Por favor, revisa los logs del pipeline para solucionar el error.
            [Ver Ejecución](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
