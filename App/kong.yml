_format_version: "3.0"
_transform: true

services:
  - name: usuarios-service
    url: http://ms-usuarios-roles-auth:8081
    routes:
      - name: usuarios-route
        paths:
          - /api/v1/auth
          - /api/v1/usuarios

  - name: zonas-service
    url: http://ms-zonas-espacios:8082
    routes:
      - name: zonas-route
        paths:
          - /api/v1/zonas
          - /api/v1/espacios

  - name: vehiculos-service
    url: http://ms-vehiculos:3000
    routes:
      - name: vehiculos-route
        paths:
          - /api/v1/vehiculos

  - name: tickets-service
    url: http://ms-tickets:3000
    routes:
      - name: tickets-route
        paths:
          - /api/v1/tickets
