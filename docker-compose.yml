version: '3.8'

services:
  # Base de Datos PostgreSQL (para usuarios, tickets, etc.)
  postgres-db:
    image: postgres:15-alpine
    container_name: parking-postgres
    environment:
      POSTGRES_DB: parking_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - parking-network

  # Base de Datos MySQL/MariaDB (si se requiere para vehiculos/eventos)
  mysql-db:
    image: mysql:8.0
    container_name: parking-mysql
    environment:
      MYSQL_DATABASE: parking_events
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - parking-network

  # API Gateway (Kong)
  kong:
    image: kong:3.4
    container_name: parking-kong
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /usr/local/kong/declarative/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_PROXY_LISTEN: "0.0.0.0:8000, 0.0.0.0:8443 ssl http2"
      KONG_ADMIN_LISTEN: "0.0.0.0:8001, 0.0.0.0:8444 ssl http2"
    volumes:
      - ./App/kong.yml:/usr/local/kong/declarative/kong.yml
    ports:
      - "8000:8000"  # Puerto del Proxy (Tráfico de entrada externo)
      - "8001:8001"  # Puerto de Administración (Solo local)
    networks:
      - parking-network
    depends_on:
      - postgres-db
      - mysql-db

  # Microservicio: ms-usuarios-roles-auth (Java Spring Boot)
  ms-usuarios-roles-auth:
    build:
      context: ./App/ms-usuarios-roles-auth
      dockerfile: Dockerfile
    container_name: ms-usuarios
    ports:
      - "8081:8081"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-db:5432/parking_db
      - SPRING_DATASOURCE_USERNAME=admin
      - SPRING_DATASOURCE_PASSWORD=admin_password
    depends_on:
      - postgres-db
    networks:
      - parking-network

  # Microservicio: ms-zonas-espacios (Java Spring Boot)
  ms-zonas-espacios:
    build:
      context: ./App/ms-zonas-espacios
      dockerfile: Dockerfile
    container_name: ms-zonas
    ports:
      - "8082:8082"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-db:5432/parking_db
      - SPRING_DATASOURCE_USERNAME=admin
      - SPRING_DATASOURCE_PASSWORD=admin_password
    depends_on:
      - postgres-db
    networks:
      - parking-network

  # Microservicio: ms-vehiculos (NestJS)
  ms-vehiculos:
    build:
      context: ./App/ms-vehiculos
      dockerfile: Dockerfile
    container_name: ms-vehiculos
    ports:
      - "3001:3000"
    environment:
      - DATABASE_HOST=mysql-db
      - DATABASE_PORT=3306
      - DATABASE_USER=root
      - DATABASE_PASSWORD=root_password
      - DATABASE_NAME=parking_events
    depends_on:
      - mysql-db
    networks:
      - parking-network

  # Microservicio: ms-tickets (NestJS)
  ms-tickets:
    build:
      context: ./App/ms-tickets
      dockerfile: Dockerfile
    container_name: ms-tickets
    ports:
      - "3002:3000"
    environment:
      - DATABASE_HOST=postgres-db
      - DATABASE_PORT=5432
      - DATABASE_USER=admin
      - DATABASE_PASSWORD=admin_password
      - DATABASE_NAME=parking_db
    depends_on:
      - postgres-db
    networks:
      - parking-network

networks:
  parking-network:
    driver: bridge

volumes:
  postgres_data:
  mysql_data:
